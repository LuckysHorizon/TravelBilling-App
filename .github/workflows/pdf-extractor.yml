name: PDF Extractor - Build, Test & Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'pdf-extractor/**'
      - '.github/workflows/pdf-extractor.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pdf-extractor/**'

permissions:
  contents: read

concurrency:
  group: pdf-extractor-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pdf-extractor

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pdf-extractor/requirements.txt

      - name: Install dependencies
        working-directory: pdf-extractor
        run: |
          pip install -r requirements.txt
          pip install pytest flake8 mypy

      - name: Flake8
        working-directory: pdf-extractor
        run: flake8 . --max-line-length=120

      - name: Mypy
        working-directory: pdf-extractor
        run: mypy . --ignore-missing-imports

      - name: Pytest (if tests exist)
        working-directory: pdf-extractor
        run: |
          if [ -d tests ]; then pytest -v; else echo "No tests directory, skipping"; fi

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./pdf-extractor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Render
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: ${{ vars.PDF_EXTRACTOR_PRODUCTION_URL }}

    steps:
      - name: Trigger Render Deploy Hook
        run: |
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "${{ secrets.RENDER_PDF_EXTRACTOR_DEPLOY_HOOK_URL }}")
          if [ "$RESPONSE" -ne 200 ] && [ "$RESPONSE" -ne 201 ]; then
            echo "Render deploy hook failed with status: $RESPONSE"
            exit 1
          fi

      - name: Wait & verify health
        run: |
          echo "Waiting 45s for Render cold start..."
          sleep 45
          MAX_RETRIES=10
          RETRY=0
          HEALTH_URL="${{ vars.PDF_EXTRACTOR_PRODUCTION_URL }}/health"
          until curl -sf "$HEALTH_URL"; do
            RETRY=$((RETRY+1))
            if [ "$RETRY" -ge "$MAX_RETRIES" ]; then
              echo "PDF Extractor health check failed after $MAX_RETRIES attempts"
              exit 1
            fi
            echo "Health check retry $RETRY/$MAX_RETRIES..."
            sleep 12
          done
          echo "PDF Extractor is healthy!"
