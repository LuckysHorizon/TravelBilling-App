name: Deploy All Services

on:
  workflow_dispatch:
    inputs:
      deploy_backend:
        description: 'Deploy Backend (Spring Boot → Render)'
        type: boolean
        default: true
      deploy_agent_llm:
        description: 'Deploy Agent LLM (FastAPI → Render)'
        type: boolean
        default: true
      deploy_pdf_extractor:
        description: 'Deploy PDF Extractor (FastAPI → Railway)'
        type: boolean
        default: true
      deploy_frontend:
        description: 'Deploy Frontend (React → Vercel)'
        type: boolean
        default: true

permissions:
  contents: read
  packages: write
  pull-requests: write

concurrency:
  group: deploy-all
  cancel-in-progress: false

jobs:
  # ── Phase 1: Backend first (may run Flyway migrations) ─────
  backend:
    name: Backend → Render
    if: ${{ inputs.deploy_backend }}
    uses: ./.github/workflows/backend.yml
    secrets: inherit

  # ── Phase 2: Microservices in parallel (after backend) ─────
  agent-llm:
    name: Agent LLM → Render
    needs: backend
    if: ${{ always() && inputs.deploy_agent_llm && (needs.backend.result == 'success' || needs.backend.result == 'skipped') }}
    uses: ./.github/workflows/agent-llm.yml
    secrets: inherit

  pdf-extractor:
    name: PDF Extractor → Railway
    needs: backend
    if: ${{ always() && inputs.deploy_pdf_extractor && (needs.backend.result == 'success' || needs.backend.result == 'skipped') }}
    uses: ./.github/workflows/pdf-extractor.yml
    secrets: inherit

  # ── Phase 3: Frontend last (needs all APIs up) ─────────────
  frontend:
    name: Frontend → Vercel
    needs: [agent-llm, pdf-extractor]
    if: ${{ always() && inputs.deploy_frontend && !contains(needs.*.result, 'failure') }}
    uses: ./.github/workflows/frontend.yml
    secrets: inherit

  # ── Phase 4: Stack health verification ─────────────────────
  verify:
    name: Verify Full Stack
    runs-on: ubuntu-latest
    needs: [backend, agent-llm, pdf-extractor, frontend]
    if: ${{ always() }}

    steps:
      - name: Summary
        run: |
          echo "## Deployment Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | ${{ needs.backend.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Agent LLM | ${{ needs.agent-llm.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| PDF Extractor | ${{ needs.pdf-extractor.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | ${{ needs.frontend.result }} |" >> $GITHUB_STEP_SUMMARY

      - name: Verify Backend health
        if: ${{ inputs.deploy_backend && needs.backend.result == 'success' }}
        run: curl -sf https://travelbilling-api.onrender.com/health || echo "⚠️ Backend health check failed"

      - name: Verify PDF Extractor health
        if: ${{ inputs.deploy_pdf_extractor && needs.pdf-extractor.result == 'success' }}
        run: curl -sf "${{ vars.PDF_EXTRACTOR_PRODUCTION_URL }}/health" || echo "⚠️ PDF Extractor health check failed"

      - name: Verify Frontend
        if: ${{ inputs.deploy_frontend && needs.frontend.result == 'success' }}
        run: curl -sf https://travelbilling-app.vercel.app || echo "⚠️ Frontend health check failed"
