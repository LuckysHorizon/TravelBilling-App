name: PDF Extractor - Build, Test & Deploy to Railway

on:
  push:
    branches: [main]
    paths:
      - 'pdf-extractor/**'
      - '.github/workflows/pdf-extractor.yml'
  pull_request:
    branches: [main]
    paths:
      - 'pdf-extractor/**'

permissions:
  contents: read

concurrency:
  group: pdf-extractor-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: '3.11'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}/pdf-extractor

jobs:
  quality:
    name: Lint and test
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'
          cache-dependency-path: pdf-extractor/requirements.txt

      - name: Install dependencies
        working-directory: pdf-extractor
        run: |
          pip install -r requirements.txt
          pip install pytest flake8 mypy

      - name: Flake8
        working-directory: pdf-extractor
        run: flake8 . --max-line-length=120

      - name: Mypy
        working-directory: pdf-extractor
        run: mypy . --ignore-missing-imports

      - name: Pytest (if tests exist)
        working-directory: pdf-extractor
        run: |
          if [ -d tests ]; then pytest -v; else echo "No tests directory, skipping"; fi

  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: quality
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./pdf-extractor
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  deploy:
    name: Deploy to Railway
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment:
      name: production
      url: https://pdf-service.up.railway.app

    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        working-directory: pdf-extractor
        run: railway up --service pdf-extractor --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

      - name: Wait & verify health
        run: |
          sleep 45
          curl -f https://pdf-service.up.railway.app/health
