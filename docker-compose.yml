services:
  db:
    image: postgres:15-alpine
    container_name: travelbill-postgres
    environment:
      POSTGRES_DB: travelbill
      POSTGRES_USER: travelbill
      POSTGRES_PASSWORD: travelbill
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U travelbill"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: travelbill-redis
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      target: runner
    container_name: travelbill-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/travelbill
      SPRING_DATASOURCE_USERNAME: travelbill
      SPRING_DATASOURCE_PASSWORD: travelbill
      SPRING_REDIS_HOST: redis
      SERVER_PORT: 8080
      EXTRACTION_SERVICE_URL: http://pdf-extractor:8000/extract
      EXTRACTION_HEALTH_URL: http://pdf-extractor:8000/health
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  pdf-extractor:
    build:
      context: ./pdf-extractor
      target: runner
    container_name: travelbill-pdf-extractor
    ports:
      - "8000:8000"
    environment:
      SERVICE_PORT: 8000

  frontend:
    build:
      context: ./frontend
      target: builder
    container_name: travelbill-frontend
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8080
      VITE_PDF_SERVICE_URL: http://localhost:8000
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
