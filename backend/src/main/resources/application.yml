# ═══════════════════════════════════════════════════════════════
# TravelBill Pro — Base Configuration (shared across all profiles)
# ═══════════════════════════════════════════════════════════════
# Profile-specific overrides live in:
#   application-dev.yml   → local development
#   application-prod.yml  → production deployment
#
# Activate via:  SPRING_PROFILES_ACTIVE=dev  (or prod)
# ═══════════════════════════════════════════════════════════════

spring:
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  application:
    name: travelbill-pro

  # ── Database ────────────────────────────────────────────────
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}
    username: ${SPRING_DATASOURCE_USERNAME:travelbill}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${HIKARI_MAX_POOL:10}
      minimum-idle: ${HIKARI_MIN_IDLE:3}
      connection-timeout: 20000
      idle-timeout: 300000
      max-lifetime: 600000
      pool-name: TravelBillPool

  # ── JPA (shared settings) ──────────────────────────────────
  jpa:
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # ── Redis ──────────────────────────────────────────────────
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}
      timeout: 5000
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1

  # ── Flyway ─────────────────────────────────────────────────
  flyway:
    enabled: true
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}
    user: ${SPRING_DATASOURCE_USERNAME:travelbill}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    placeholders:
      master_db_url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}

  # ── SMTP ───────────────────────────────────────────────────
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:}
    password: ${SMTP_PASS:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # ── File Upload ────────────────────────────────────────────
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 500MB

server:
  port: ${SERVER_PORT:8080}

# ── App Custom Config ────────────────────────────────────────
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
  storage:
    base-path: ${STORAGE_BASE_PATH:./data/storage}
  security:
    jwt:
      secret: ${JWT_SECRET:}
      access-token-expiration-ms: 28800000   # 8 hours
      refresh-token-expiration-ms: 604800000 # 7 days
  nvidia:
    api-key: ${NVIDIA_API_KEY:}
    base-url: https://integrate.api.nvidia.com/v1
    model-text: meta/llama-3.1-70b-instruct
    model-vision: meta/llama-3.2-90b-vision-instruct
    max-tokens: 4096
    timeout-seconds: 90
    rate-limit-per-minute: 38
  rate-limit:
    ip: 500
    user: 200
  keepalive:
    enabled: ${KEEPALIVE_ENABLED:true}
    cron: ${KEEPALIVE_CRON:0 0 */6 * * *}
    connection-timeout-ms: ${KEEPALIVE_CONNECTION_TIMEOUT:10000}
    max-threads: ${KEEPALIVE_MAX_THREADS:5}
    retention-days: ${KEEPALIVE_RETENTION_DAYS:90}

# ── Python PDF Extraction Microservice ───────────────────────
extraction:
  service:
    url: ${EXTRACTION_SERVICE_URL:http://localhost:8000/extract-upload}
    health-url: ${EXTRACTION_HEALTH_URL:http://localhost:8000/health}
    timeout-seconds: ${EXTRACTION_TIMEOUT:120}

# ── Agent AI Configuration ───────────────────────────────────
agent:
  llm-service-url: ${AGENT_LLM_SERVICE_URL:http://localhost:8001}
  rate-limit-per-minute: ${AGENT_RATE_LIMIT_PER_MINUTE:20}
  rate-limit-per-day: ${AGENT_RATE_LIMIT_PER_DAY:500}
  max-context-messages: 20
  stream-timeout-seconds: 60
