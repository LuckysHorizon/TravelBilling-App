spring:
  application:
    name: travelbill-pro
  
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}
    username: ${SPRING_DATASOURCE_USERNAME:travelbill}
    password: ${SPRING_DATASOURCE_PASSWORD:Lucky@0716}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  # Flyway Configuration
  flyway:
    enabled: true
    baseline-on-migrate: true

  # SMTP Configuration
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:smtpuser}
    password: ${SMTP_PASS:smtppassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  # File Upload Config
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 500MB

server:
  port: ${SERVER_PORT:8080}

# TravelBill Pro Custom Configuration
app:
  storage:
    base-path: ${STORAGE_BASE_PATH:./data/storage}
  security:
    jwt:
      secret: ${JWT_SECRET:dHJhdmVsYmlsbC1wcm8tdmVyeS1zZWN1cmUtYW5kLWxvbmctc2VjcmV0LWtleS1mb3Itand0LXNpZ25hdHVyZQ==}
      access-token-expiration-ms: 28800000 # 8 hours
      refresh-token-expiration-ms: 604800000 # 7 days
  gemini:
    api-key: ${GEMINI_API_KEY:}
  rate-limit:
    ip: 500
    user: 200

logging:
  level:
    com.travelbillpro: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
