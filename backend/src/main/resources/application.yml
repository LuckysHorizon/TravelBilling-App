spring:
  profiles:
    include: secret
  application:
    name: travelbill-pro
  
  # Database Configuration
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}
    username: ${SPRING_DATASOURCE_USERNAME:travelbill}
    password: ${SPRING_DATASOURCE_PASSWORD:Lucky@0716}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: 20
      minimum-idle: 5
      connection-timeout: 30000

  # JPA Configuration
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

  # Redis Configuration
  data:
    redis:
      host: ${SPRING_REDIS_HOST:localhost}
      port: ${SPRING_REDIS_PORT:6379}

  # Flyway Configuration — runs ONLY against the master DB
  flyway:
    enabled: true
    baseline-on-migrate: true
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}
    user: ${SPRING_DATASOURCE_USERNAME:travelbill}
    password: ${SPRING_DATASOURCE_PASSWORD:Lucky@0716}
    placeholders:
      master_db_url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/travelbill}

  # SMTP Configuration
  mail:
    host: ${SMTP_HOST:smtp.example.com}
    port: ${SMTP_PORT:587}
    username: ${SMTP_USER:smtpuser}
    password: ${SMTP_PASS:smtppassword}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            
  # File Upload Config
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 500MB

server:
  port: ${SERVER_PORT:8080}

# TravelBill Pro Custom Configuration
app:
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173,http://127.0.0.1:3000,http://127.0.0.1:5173}
  storage:
    base-path: ${STORAGE_BASE_PATH:./data/storage}
  security:
    jwt:
      secret: ${JWT_SECRET:dHJhdmVsYmlsbC1wcm8tdmVyeS1zZWN1cmUtYW5kLWxvbmctc2VjcmV0LWtleS1mb3Itand0LXNpZ25hdHVyZQ==}
      access-token-expiration-ms: 28800000 # 8 hours
      refresh-token-expiration-ms: 604800000 # 7 days
  nvidia:
    api-key: ${NVIDIA_API_KEY:}
    base-url: https://integrate.api.nvidia.com/v1
    model-text: meta/llama-3.1-70b-instruct
    model-vision: meta/llama-3.2-90b-vision-instruct
    max-tokens: 4096
    timeout-seconds: 90
    rate-limit-per-minute: 38
  rate-limit:
    ip: 500
    user: 200

# Python PDF Extraction Microservice
extraction:
  service:
    url: ${EXTRACTION_SERVICE_URL:http://localhost:8000/extract}
    health-url: ${EXTRACTION_HEALTH_URL:http://localhost:8000/health}
    timeout-seconds: ${EXTRACTION_TIMEOUT:120}

logging:
  level:
    com.travelbillpro: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: WARN
    org.apache.pdfbox.pdmodel.font: ERROR
  file:
    name: logs/app.log
  charset:
    console: UTF-8
    file: UTF-8
