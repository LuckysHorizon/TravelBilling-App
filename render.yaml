# ═══════════════════════════════════════════════════════════════
# Render Blueprint — TravelBill Pro
# ═══════════════════════════════════════════════════════════════
# This file declares the Render services for Infrastructure-as-Code.
# Deploy via: https://render.com/deploy → point to this repo
#
# Services NOT on Render:
#   - Frontend       → Vercel  (travelbilling.vercel.app)
#   - PDF Extractor  → Railway (pdf-service.up.railway.app)
#   - Database       → Supabase (external PostgreSQL)
# ═══════════════════════════════════════════════════════════════

services:
  # ── Spring Boot Backend ──────────────────────────────────────
  - type: web
    name: travelbilling-api
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    repo: https://github.com/LuckysHorizon/TravelBilling-App
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    numInstances: 1
    envVars:
      # ── Spring Profile ───────────────────────────────────
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: SERVER_PORT
        value: "8080"

      # ── Database (Supabase) ──────────────────────────────
      - key: SPRING_DATASOURCE_URL
        sync: false
      - key: SPRING_DATASOURCE_USERNAME
        sync: false
      - key: SPRING_DATASOURCE_PASSWORD
        sync: false

      # ── Security ─────────────────────────────────────────
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ALLOWED_ORIGINS
        value: https://travelbilling.vercel.app

      # ── Microservice URLs ────────────────────────────────
      - key: EXTRACTION_SERVICE_URL
        value: https://pdf-service.up.railway.app/extract-upload
      - key: EXTRACTION_HEALTH_URL
        value: https://pdf-service.up.railway.app/health
      - key: AGENT_LLM_SERVICE_URL
        value: https://travelbill-agent-llm.onrender.com

      # ── Redis ────────────────────────────────────────────
      - key: SPRING_REDIS_HOST
        sync: false
      - key: SPRING_REDIS_PORT
        value: "6379"

      # ── SMTP ─────────────────────────────────────────────
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false

      # ── AI / LLM ────────────────────────────────────────
      - key: NVIDIA_API_KEY
        sync: false

      # ── Keep-Alive ───────────────────────────────────────
      - key: KEEPALIVE_ENABLED
        value: "true"
      - key: KEEPALIVE_CRON
        value: "0 0 */6 * * *"

  # ── Agent LLM Microservice ──────────────────────────────────
  - type: web
    name: travelbill-agent-llm
    runtime: docker
    dockerfilePath: ./agent-llm/Dockerfile
    dockerContext: ./agent-llm
    repo: https://github.com/LuckysHorizon/TravelBilling-App
    plan: starter
    region: oregon
    branch: main
    healthCheckPath: /health
    numInstances: 1
    envVars:
      - key: GROQ_API_KEY_FALLBACK
        sync: false
      - key: SERVICE_PORT
        value: "8001"
      - key: LOG_LEVEL
        value: INFO
